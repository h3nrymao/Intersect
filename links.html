<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Links — Henry Mao</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Century Schoolbook';
    src: local('Century Schoolbook'), local('CenturySchoolbook'), local('Century Schoolbook L');
  }
  :root {
    --ink: #1a1a1a; --cream: #fafaf7; --accent: #c45830; --muted: #999;
    --border: #e8e5de; --parchment: #eeeae3;
    --body-font: 'Century Schoolbook', Georgia, serif;
    --ui-font: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--body-font);
    background: linear-gradient(180deg, var(--parchment) 0%, var(--cream) 60%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }
  .wrap { width: 100%; max-width: 720px; text-align: center; }

  .eyebrow {
    font-family: var(--ui-font);
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 1.4rem;
  }
  h1 {
    font-family: var(--body-font);
    font-size: clamp(2.4rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #d8d3c8;
    margin: 1.8rem auto 2.2rem;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 1.4rem;
  }
  .link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: color 0.2s ease, transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .link:hover { color: var(--accent); transform: translateY(-2px); }

  .icon {
    width: 26px;
    height: 26px;
    background-color: currentColor;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
    -webkit-mask-size: contain;
            mask-size: contain;
    display: block;
  }
  .icon-email     { -webkit-mask-image: url(https://cdn.simpleicons.org/gmail);      mask-image: url(https://cdn.simpleicons.org/gmail); }
  .icon-linkedin  { -webkit-mask-image: url(https://cdn.simpleicons.org/linkedin);   mask-image: url(https://cdn.simpleicons.org/linkedin); }
  .icon-x         { -webkit-mask-image: url(https://cdn.simpleicons.org/x);          mask-image: url(https://cdn.simpleicons.org/x); }
  .icon-github    { -webkit-mask-image: url(https://cdn.simpleicons.org/github);     mask-image: url(https://cdn.simpleicons.org/github); }
  .icon-instagram { -webkit-mask-image: url(https://cdn.simpleicons.org/instagram);  mask-image: url(https://cdn.simpleicons.org/instagram); }
  .icon-tiktok    { -webkit-mask-image: url(https://cdn.simpleicons.org/tiktok);     mask-image: url(https://cdn.simpleicons.org/tiktok); }
  .icon-youtube   { -webkit-mask-image: url(https://cdn.simpleicons.org/youtube);    mask-image: url(https://cdn.simpleicons.org/youtube); }
  .icon-spotify   { -webkit-mask-image: url(https://cdn.simpleicons.org/spotify);    mask-image: url(https://cdn.simpleicons.org/spotify); }
  .icon-letterboxd{ -webkit-mask-image: url(https://cdn.simpleicons.org/letterboxd); mask-image: url(https://cdn.simpleicons.org/letterboxd); }
  .icon-strava    { -webkit-mask-image: url(https://cdn.simpleicons.org/strava);     mask-image: url(https://cdn.simpleicons.org/strava); }
  .icon-pinterest { -webkit-mask-image: url(https://cdn.simpleicons.org/pinterest);  mask-image: url(https://cdn.simpleicons.org/pinterest); }
  .icon-facebook  { -webkit-mask-image: url(https://cdn.simpleicons.org/facebook);   mask-image: url(https://cdn.simpleicons.org/facebook); }
  .icon-snapchat  { -webkit-mask-image: url(https://cdn.simpleicons.org/snapchat);   mask-image: url(https://cdn.simpleicons.org/snapchat); }

  footer {
    margin-top: 2.6rem;
    font-family: var(--ui-font);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Find Me</div>
    <h1>Henry Mao</h1>
    <div class="divider"></div>

    <nav class="links" aria-label="Social links">
      <a class="link" href="mailto:henrymaohl@gmail.com" aria-label="Email"><span class="icon icon-email"></span></a>
      <a class="link" href="https://www.linkedin.com/in/maohenry/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><span class="icon icon-linkedin"></span></a>
      <a class="link" href="https://x.com/h3nrymao" target="_blank" rel="noopener noreferrer" aria-label="X"><span class="icon icon-x"></span></a>
      <a class="link" href="https://github.com/h3nrymao" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><span class="icon icon-github"></span></a>
      <a class="link" href="https://www.instagram.com/h3nrymao/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><span class="icon icon-instagram"></span></a>
      <a class="link" href="https://www.tiktok.com/@maohenry" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><span class="icon icon-tiktok"></span></a>
      <a class="link" href="https://www.youtube.com/@h3nrymao" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><span class="icon icon-youtube"></span></a>
      <a class="link" href="https://open.spotify.com/user/21fjkyrp24vy6mwiizjf4xiqq" target="_blank" rel="noopener noreferrer" aria-label="Spotify"><span class="icon icon-spotify"></span></a>
      <a class="link" href="https://letterboxd.com/henrymao/" target="_blank" rel="noopener noreferrer" aria-label="Letterboxd"><span class="icon icon-letterboxd"></span></a>
      <a class="link" href="https://www.strava.com/athletes/henrymao" target="_blank" rel="noopener noreferrer" aria-label="Strava"><span class="icon icon-strava"></span></a>
      <a class="link" href="https://au.pinterest.com/h3nrymao/" target="_blank" rel="noopener noreferrer" aria-label="Pinterest"><span class="icon icon-pinterest"></span></a>
      <a class="link" href="https://www.facebook.com/henry.mao.975010/" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><span class="icon icon-facebook"></span></a>
      <a class="link" href="https://snapchat.com/t/nwby3CkC" target="_blank" rel="noopener noreferrer" aria-label="Snapchat"><span class="icon icon-snapchat"></span></a>
    </nav>

    <footer>© Henry Mao</footer>
  </main>
</body>
</html>
