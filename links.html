<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Links — Henry Mao</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer">
<style>
  @font-face {
    font-family: 'Century Schoolbook';
    src: local('Century Schoolbook'), local('CenturySchoolbook'), local('Century Schoolbook L');
  }
  :root {
    --ink: #1a1a1a; --cream: #fafaf7; --accent: #c45830; --muted: #999;
    --border: #e8e5de; --parchment: #eeeae3;
    --body-font: 'Century Schoolbook', Georgia, serif;
    --ui-font: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--body-font);
    background: linear-gradient(180deg, var(--parchment) 0%, var(--cream) 60%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }
  .wrap { width: 100%; max-width: 720px; text-align: center; }

  .eyebrow {
    font-family: var(--ui-font);
    font-size: 0.72rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 1.4rem;
  }
  h1 {
    font-family: var(--body-font);
    font-size: clamp(2.4rem, 6vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: #d8d3c8;
    margin: 1.8rem auto 2.2rem;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 1.4rem;
    font-size: 26px;
  }
  .link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1em;
    height: 1em;
    color: var(--ink);
    text-decoration: none;
    transition: color 0.2s ease, transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .link:hover { color: var(--accent); transform: translateY(-2px); }
  .link i, .link svg { font-size: 1em; width: 1em; height: 1em; display: block; line-height: 1; }
  .link svg { fill: currentColor; }

  footer {
    margin-top: 2.6rem;
    font-family: var(--ui-font);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Find Me</div>
    <h1>Henry Mao</h1>
    <div class="divider"></div>

    <nav class="links" aria-label="Social links">

      <a class="link" href="https://www.linkedin.com/in/maohenry/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>

      <a class="link" href="https://github.com/h3nrymao" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
      <a class="link" href="https://www.instagram.com/h3nrymao/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a class="link" href="https://www.tiktok.com/@maohenry" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a class="link" href="https://www.youtube.com/@h3nrymao" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
      <a class="link" href="https://open.spotify.com/user/21fjkyrp24vy6mwiizjf4xiqq" target="_blank" rel="noopener noreferrer" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
      <a class="link" href="https://letterboxd.com/henrymao/" target="_blank" rel="noopener noreferrer" aria-label="Letterboxd">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="3.4"/><circle cx="12" cy="12" r="3.4"/><circle cx="19" cy="12" r="3.4"/></svg>
      </a>
      <a class="link" href="https://www.strava.com/athletes/henrymao" target="_blank" rel="noopener noreferrer" aria-label="Strava"><i class="fa-brands fa-strava"></i></a>

      <a class="link" href="https://snapchat.com/t/nwby3CkC" target="_blank" rel="noopener noreferrer" aria-label="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
    </nav>

    <footer>© Henry Mao</footer>
  </main>
</body>
</html>
